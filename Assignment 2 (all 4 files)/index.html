<!DOCTYPE html>
<html>
    <head>
        <title> BGCS Scenario Practice</title>
        <!-- Connecting the CSS file-->
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1> > BGCS Scenario Practice Questions</h1>
            <p> > Test your knowledge by practicing beginner-friendly commands!</p>
        </header>

    <main>
        <!-- Implementing interactive controls for the UI-->
        <section class = "controls">
            <!-- Creating the search bar function-->
             <form id="search-form">
                <input type="text" id = "search-input" placeholder = "Search scenarios by key words" autocomplete="off">
                <button type = "submit"> Search </button>
            </form>

            <!-- Creating the filter dropdown menu to show specific question types-->
            <select id = "Context-filter">
                <option value = "All"> All Categories </option>
                <option value = "Linux"> Linux Scenarios </option>
                <option value = "Powershell"> Powershell Scenarios </option>
                <option value = "Networking"> Netowrking Scenarios </option>
                <option value = "Security"> Security Scenarios </option>
            </select>
        </section>

        <!-- (Just in case) loading and/or errors-->
        <div id = "status-message"> </div>

        <!-- Result drop down accordian (like from the first assignment)-->
         <section id = "result dropdown" class = "grid">
            <!-- Java script will design the boxes-->
         </section>
    </main>

    <!-- Finally, connecting the Javascript file-->
    <script src="app.js"></script>

    </body>
</html>
